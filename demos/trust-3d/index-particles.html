<!DOCTYPE html>
<html lang="es">
<head>
  <title>DOF-MESH LEGION | Particle Visualizer</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #030308;
      color: #e0e0e0;
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    canvas { display: block; width: 100vw; height: 100vh; }

    /* ── HUD Top Bar ── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 48px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      background: rgba(3, 3, 8, 0.7);
      border-bottom: 1px solid rgba(0, 255, 136, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    #topbar .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600; font-size: 14px; color: #00ff88;
      letter-spacing: 1.5px;
    }
    #topbar .logo .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #00ff88;
      box-shadow: 0 0 12px #00ff88;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 12px #00ff88; }
      50% { opacity: 0.5; box-shadow: 0 0 4px #00ff88; }
    }
    #topbar .stats {
      display: flex; gap: 20px; font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
    }
    .stat-item { display: flex; align-items: center; gap: 6px; color: #555; }
    .stat-item .val { color: #fff; font-weight: 600; }
    .stat-item .val.green { color: #00ff88; }
    .stat-item .val.blue { color: #00b4ff; }
    .stat-item .val.amber { color: #ffaa00; }
    .stat-item .val.purple { color: #aa88ff; }

    /* ── Legend Bottom ── */
    #legend {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      z-index: 150;
      display: flex; gap: 20px;
      padding: 8px 20px;
      background: rgba(3, 3, 8, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      font-size: 11px; color: #777;
      font-family: 'JetBrains Mono', monospace;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 50%;
      box-shadow: 0 0 6px currentColor;
    }

    /* ── Control Panel (right side) ── */
    #controls {
      position: fixed; top: 64px; right: 16px; z-index: 200;
      width: 220px;
      background: rgba(3, 3, 8, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 16px;
    }
    #controls h3 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 600;
      color: #555; letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .ctrl-group { margin-bottom: 14px; }
    .ctrl-group label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: #888; margin-bottom: 4px;
      font-family: 'JetBrains Mono', monospace;
    }
    .ctrl-group label span { color: #00ff88; font-weight: 600; }
    .ctrl-group input[type="range"] {
      width: 100%; height: 4px;
      -webkit-appearance: none; appearance: none;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px; outline: none;
    }
    .ctrl-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: #00ff88; cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
    }

    /* ── Formation Buttons ── */
    .formation-btns {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
      margin-top: 12px;
    }
    .form-btn {
      padding: 7px 0;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px; color: #888;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      letter-spacing: 0.5px;
    }
    .form-btn:hover { background: rgba(255, 255, 255, 0.08); color: #ddd; }
    .form-btn.active {
      background: rgba(0, 255, 136, 0.1);
      border-color: rgba(0, 255, 136, 0.3);
      color: #00ff88;
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed; z-index: 300;
      padding: 8px 14px;
      background: rgba(3, 3, 8, 0.9);
      border: 1px solid rgba(0, 255, 136, 0.2);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: #00ff88;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      max-width: 260px;
    }
    #tooltip .tt-name { font-weight: 600; margin-bottom: 2px; }
    #tooltip .tt-layer { color: #666; font-size: 10px; }

    /* ── FPS Counter ── */
    #fps {
      position: fixed; bottom: 16px; right: 16px; z-index: 150;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: #333;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #controls { width: 180px; right: 8px; top: 56px; padding: 12px; }
      #topbar .stats { gap: 10px; font-size: 10px; }
      #legend { gap: 10px; font-size: 9px; padding: 6px 12px; }
    }
  </style>
</head>
<body>

  <!-- HUD Top Bar -->
  <div id="topbar">
    <div class="logo">
      <div class="dot"></div>
      DOF-MESH LEGION
    </div>
    <div class="stats">
      <div class="stat-item">Nodos <span class="val green">65</span></div>
      <div class="stat-item">Tests <span class="val blue">3,632</span></div>
      <div class="stat-item">Z3 <span class="val purple">4/4</span></div>
      <div class="stat-item">Health <span class="val green">98%</span></div>
    </div>
  </div>

  <!-- Controls Panel -->
  <div id="controls">
    <h3>Controles</h3>

    <div class="ctrl-group">
      <label>Particles <span id="v-particles">15000</span></label>
      <input type="range" id="sl-particles" min="5000" max="30000" value="15000" step="1000">
    </div>
    <div class="ctrl-group">
      <label>Speed <span id="v-speed">1.0</span></label>
      <input type="range" id="sl-speed" min="0.1" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="ctrl-group">
      <label>Glow <span id="v-glow">1.5</span></label>
      <input type="range" id="sl-glow" min="0.5" max="3.0" value="1.5" step="0.1">
    </div>

    <h3>Formacion</h3>
    <div class="formation-btns">
      <button class="form-btn active" data-formation="radial">Radial</button>
      <button class="form-btn" data-formation="sphere">Sphere</button>
      <button class="form-btn" data-formation="helix">Helix</button>
      <button class="form-btn" data-formation="explode">Explode</button>
    </div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip">
    <div class="tt-name"></div>
    <div class="tt-layer"></div>
  </div>

  <!-- Legend -->
  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="color:#00ff88;background:#00ff88"></div>Core</div>
    <div class="legend-item"><div class="legend-dot" style="color:#00d988;background:#00d988"></div>Governance</div>
    <div class="legend-item"><div class="legend-dot" style="color:#00b4ff;background:#00b4ff"></div>Agentes</div>
    <div class="legend-item"><div class="legend-dot" style="color:#ffaa00;background:#ffaa00"></div>LLM Mesh</div>
    <div class="legend-item"><div class="legend-dot" style="color:#aa88ff;background:#aa88ff"></div>MCPs</div>
    <div class="legend-item"><div class="legend-dot" style="color:#ff6644;background:#ff6644"></div>Modules</div>
  </div>

  <!-- FPS -->
  <div id="fps"></div>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="trust-network.js"></script>
</body>
</html>
