# Project Citadel: Sovereign Orchestration
services:
  citadel-swarm:
    build: .
    container_name: dof-mesh-citadel
    # Isolation: No external internet access by default (Sovereign/Air-Gap)
    networks:
      - mesh-internal
    
    # Extra Hosts: Required to route traffic out of the container directly to the host's Ollama model
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Volumes: Mount your history and secrets as READ-ONLY
    volumes:
      # Code (ReadOnly to prevent agents from self-modifying or malware persistence)
      - .:/app:ro
      # Logs (Read-Write for audit trail)
      - ./logs:/app/logs:rw
      # The Sovereign Vault (History & Book - READ-ONLY)
      - ./Sovereign_Vault:/app/Sovereign_Vault:ro
      # The .env Secrets (READ-ONLY)
      - ./.env:/app/.env:ro
    
    # Environment
    environment:
      - CITADEL_MODE=SOVEREIGN
      - PYTHONUNBUFFERED=1

networks:
  mesh-internal:
    driver: bridge
