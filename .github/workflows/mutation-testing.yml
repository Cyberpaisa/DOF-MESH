name: Mutation Testing (mutmut)

on:
  push:
    branches: ["main"]
    paths:
      - 'core/adversarial.py'
      - 'core/governance.py'
      - 'core/z3_gate.py'
      - '.github/workflows/mutation-testing.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mutation-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install z3-solver pyyaml python-dotenv rich blake3 fastapi httpx sqlalchemy web3 psutil
          pip install -e . --no-deps
          pip install mutmut
      - name: Run mutation testing
        run: mutmut run || true
      - name: Report mutation score
        run: |
          mutmut results || true
          KILLED=$(mutmut results 2>/dev/null | grep -oP 'Killed: \K\d+' || echo 0)
          TOTAL=$(mutmut results 2>/dev/null | grep -oP 'Total: \K\d+' || echo 0)
          if [ "$TOTAL" -eq 0 ]; then
            echo "ℹ️  No mutants generated (no testable paths changed). Score: N/A"
          else
            echo "🧬 Mutation score: $KILLED / $TOTAL killed"
          fi
