name: Mutation Testing (Sovereign)

on:
  push:
    branches: ["main"]
    paths:
      - 'core/adversarial.py'
      - 'core/governance.py'
      - 'core/z3_gate.py'
      - '.github/workflows/mutation-testing.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'core/adversarial.py'
      - 'core/governance.py'
      - 'core/z3_gate.py'
      - '.github/workflows/mutation-testing.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mutation-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install z3-solver pyyaml python-dotenv rich blake3 fastapi httpx sqlalchemy web3 psutil
          pip install -e . --no-deps
      - name: Run sovereign mutation verifier
        run: python scripts/mutation_verifier.py
