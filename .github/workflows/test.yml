name: Tests

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        # pytest has a web3 plugin conflict in this project — use unittest runner
        run: |
          python -m unittest \
            tests.test_ast_verifier \
            tests.test_z3_verifier \
            tests.test_adversarial \
            tests.test_constitution \
            tests.test_task_contract \
            tests.test_causal \
            tests.test_bayesian_provider \
            -v

      - name: Verify public API imports
        run: python -c "import dof; print('dof', dof.__version__, '— OK')"

      - name: Run quickstart example (smoke test)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python examples/quickstart.py
        # NOTE: Z3 proofs and governance run without API key.
        # Crew execution is skipped in this example — no API key required.
