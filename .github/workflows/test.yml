name: Tests

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install test dependencies (minimal — no crewai/litellm)
        run: |
          pip install --upgrade pip
          pip install pytest z3-solver pyyaml python-dotenv rich blake3 fastapi httpx sqlalchemy web3 psutil

      - name: Install dof package (no transitive deps)
        run: pip install -e . --no-deps

      - name: Run canonical test suite
        run: npm run test

      - name: Run safe test suite
        run: npm run test:safe

      - name: Verify public API imports
        run: python -c "import dof; print('dof', dof.__version__, '— OK')"

      - name: Run quickstart example (smoke test)
        run: python examples/quickstart.py
        # Z3 proofs, governance, metrics, and error classification
        # run without any API keys or crewai dependency.
