# ============================================
# TEAM TASKS - Complete workflow
# ============================================

# PHASE 1: Strategy (Product Manager + BizDev)
definir_producto:
  description: >
    Analyze the user requirement: {objetivo}.
    Define the main features, write user stories with acceptance
    criteria, and prioritize using the RICE framework.
    Deliver a clear document with: product vision, prioritized features,
    and user stories for the technical team.
  expected_output: >
    Document with: 1) Product vision, 2) Prioritized feature list
    with RICE score, 3) User stories with acceptance criteria
  agent: product_manager

analizar_negocio:
  description: >
    For the defined product, create a business model:
    Business Model Canvas, competitive analysis (minimum 3 competitors),
    monetization strategy, and initial go-to-market plan.
    Product context: {objetivo}
  expected_output: >
    Complete Business Model Canvas, competitive analysis, monetization
    strategy with basic unit economics, and go-to-market plan
  agent: bizdev

# PHASE 2: Planning (Operations Director + Architect)
planificar_ejecucion:
  description: >
    With the prioritized features and business model, create a detailed
    execution plan: sprints, dependencies, milestones, identified risks,
    and mitigation plan. Assign tasks to each agent.
  expected_output: >
    Execution plan with: defined sprints, tasks assigned per agent,
    mapped dependencies, risks with mitigation, and timeline
  agent: director_operaciones

disenar_arquitectura:
  description: >
    Design the project's technical architecture: technology stack,
    directory structure, API design, data model,
    and infrastructure decisions. Justify each decision.
  expected_output: >
    Architecture document with: component diagram, chosen stack
    with justification, API design (endpoints), data model,
    and infrastructure plan
  agent: arquitecto

# PHASE 3: Research (Researcher)
investigar_tecnologias:
  description: >
    Research the technologies, APIs, and tools needed to
    implement the defined architecture. Look for best practices,
    recommended libraries, and known potential issues.
  expected_output: >
    Research report with: evaluated technologies, pros/cons of each,
    recommended libraries with versions, links to docs, and warnings
  agent: investigador

# PHASE 4: Implementation (Developer + Organizer)
organizar_proyecto:
  description: >
    Create the project's directory structure according to the defined
    architecture. Establish naming conventions, create base files,
    configure linters and formatters. Document the structure.
  expected_output: >
    Directory structure created, README with conventions,
    configuration files (eslint, prettier, etc.), and structure guide
  agent: organizador_archivos

implementar_codigo:
  description: >
    Implement the features according to the user stories and defined
    architecture. Write clean, modular code following the project's
    conventions. Create focused PRs per feature.
  expected_output: >
    Implemented, functional code following the defined architecture
    and conventions. Each feature in its corresponding module.
  agent: developer

# PHASE 5: Quality (QA)
testear_proyecto:
  description: >
    Write and run tests for all implemented code:
    unit tests (>80% coverage), integration tests for APIs,
    and e2e tests for critical flows. Report bugs found.
  expected_output: >
    Complete test suite, coverage report, list of bugs found
    with severity, and improvement recommendations
  agent: qa_engineer

# PHASE 6: Deploy (DevOps)
desplegar_proyecto:
  description: >
    Configure CI/CD pipeline, dockerize the application if needed,
    configure deployment on Railway, environment variables,
    basic monitoring, and health checks.
  expected_output: >
    CI/CD pipeline configured, Dockerfile (if applicable), successful deployment,
    documented environment variables, active health checks
  agent: devops

# CONTINUOUS TASK: Orchestration (Lead)
orquestar_equipo:
  description: >
    Supervise the entire workflow. Review the outputs of each phase,
    ensure coherence between PM, BizDev, Architect, and Developer
    decisions. Resolve conflicts and make final decisions.
    Deliver an executive summary upon completion.
  expected_output: >
    Executive summary with: status of each phase, decisions made,
    problems resolved, and final project outcome
  agent: lider_orquestador
