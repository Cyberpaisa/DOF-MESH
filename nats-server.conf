# DOF Mesh — NATS JetStream Server
# Protocol: DOF_OCTANET_v1 | Security: HARDENED TLS 1.3 + mTLS
# Generated: 2026-03-23

port: 4222
server_name: dof-nats-01

# JetStream
jetstream {
  store_dir: "./data/jetstream"
  max_memory_store: 1GB
  max_file_store: 10GB
}

# TLS 1.3 + mTLS
tls {
  cert_file:  "./certs/server.crt"
  key_file:   "./certs/server.key"
  ca_file:    "./certs/ca.crt"
  verify:     true          # mTLS: clients MUST present cert
  timeout:    10
}

# Logging
logfile: "./logs/nats/nats-server.log"
debug:   false
trace:   false

# Limits
max_connections: 1000
max_payload:     8MB
write_deadline:  "10s"
